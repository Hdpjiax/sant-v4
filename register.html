<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Santander</title>
    <link rel="icon" type="image/svg+xml"
        href="https://upload.wikimedia.org/wikipedia/commons/b/b8/Banco_Santander_Logotipo.svg">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/Banco_Santander_Logotipo.svg" alt="Santander">
            <span>Mi Banco</span>
        </div>

        <h1>Crear cuenta</h1>
        <p class="subtitle">Regístrate para acceder a tu banca digital personalizada.</p>

        <div id="auth-error" class="auth-error"></div>
        <div id="auth-success" class="auth-success"></div>

        <form id="register-form">
            <div class="auth-field">
                <label for="display-name">Nombre</label>
                <input type="text" id="display-name" placeholder="Juan Antonio" required>
            </div>

            <div class="auth-field">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
            </div>

            <div class="auth-field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6"
                    autocomplete="new-password">
            </div>

            <div class="auth-field">
                <label for="confirm-password">Confirmar contraseña</label>
                <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required minlength="6"
                    autocomplete="new-password">
            </div>

            <div class="auth-field">
                <label for="admin-code">Código de administrador (opcional)</label>
                <input type="password" id="admin-code" placeholder="Solo si eres administrador">
            </div>

            <button type="submit" class="auth-btn" id="btn-register">Registrarse</button>
        </form>

        <p class="auth-link">¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
        <p class="auth-admin-hint">Los administradores pueden gestionar los ajustes de cada usuario desde el panel de
            admin.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
